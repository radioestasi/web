<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Estasi - La radio del futuro</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --danger: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        header {
            background: rgba(0,0,0,0.95);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo-text {
            color: var(--primary);
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255,204,0,0.3);
            cursor: pointer;
        }
        nav { display: flex; gap: 25px; justify-content: center; margin: 15px 0; }
        .nav-item { position: relative; cursor: pointer; color: var(--text); font-weight: 600; font-size: 0.95rem; transition: 0.3s; }
        .nav-item:hover { color: var(--primary); }
        
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            border: 1px solid var(--primary);
            min-width: 180px;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown div { padding: 12px; border-bottom: 1px solid #222; font-size: 0.85rem; color: #fff; }
        .dropdown div:hover { background: var(--primary); color: #000; }

        .player-bar {
            max-width: 1200px;
            margin: 5px auto 0;
            background: linear-gradient(90deg, #151515, #000);
            border-radius: 50px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,204,0,0.2);
        }
        .play-controls { display: flex; align-items: center; gap: 15px; }
        .play-btn {
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; min-height: 70vh; }
        .section-flex { display: flex; align-items: center; gap: 40px; margin-bottom: 80px; }
        .hero-text { flex: 1; }
        .hero-img { width: 350px; height: 350px; border-radius: 20px; object-fit: cover; box-shadow: 0 0 30px rgba(255,204,0,0.2); }
        
        .btn {
            background: var(--primary);
            color: #000;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,204,0,0.4); }

        .on-air-badge {
            background: var(--danger);
            color: white;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.7rem;
            margin-right: 12px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.5} 100% {opacity: 1} }

        .prog-item { display: flex; align-items: center; gap: 20px; background: var(--card-bg); padding: 20px; margin-bottom: 15px; border-radius: 15px; border-left: 5px solid transparent; }
        .prog-item.active-now { border-left: 5px solid var(--danger); background: rgba(255,0,0,0.05); }
        .prog-img-circle { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); flex-shrink: 0; }

        footer { background: #000; padding: 60px 20px 30px; border-top: 2px solid #222; margin-top: 100px; }
        .footer-main { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 40px; }
        .footer-col h4 { color: var(--primary); margin-bottom: 20px; text-transform: uppercase; font-size: 0.9rem; }
        .footer-col a { display: block; color: #888; text-decoration: none; margin-bottom: 10px; font-size: 0.9rem; }
        .footer-col a:hover { color: var(--primary); }

        .admin-form { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .admin-form input, .admin-form textarea, .admin-form select { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }

        .rockol-slider { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; margin-bottom: 40px; scroll-snap-type: x mandatory; }
        .rockol-card { min-width: 300px; flex: 1; background: var(--card-bg); border-radius: 15px; overflow: hidden; scroll-snap-align: start; border: 1px solid #333; }
        .rockol-img { width: 100%; height: 150px; object-fit: cover; }
        .rockol-body { padding: 15px; }
        .rockol-body h4 { font-size: 0.9rem; margin-bottom: 10px; height: 40px; overflow: hidden; }
